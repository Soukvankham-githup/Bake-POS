<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Bake — Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div id="bgCakes" aria-hidden="true"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-icon"><i class="fas fa-birthday-cake"></i></div>
                <h1>Best Bake</h1>
                <p id="loginSubtitle"></p>
            </div>

            <div class="login-lang">
                <button class="active" data-lang="la" onclick="switchLoginLang('la')">ລາວ</button>
                <button data-lang="en" onclick="switchLoginLang('en')">EN</button>
            </div>

            <div class="login-alert" id="loginAlert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="loginAlertText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" id="labelUser"></label>
                    <div class="form-input-wrap">
                        <input type="text" class="form-input" id="username" autocomplete="username">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-error" id="errorUser">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="errorUserText"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" id="labelPass"></label>
                    <div class="form-input-wrap">
                        <input type="password" class="form-input" id="password" autocomplete="current-password">
                        <i class="fas fa-lock"></i>
                        <button type="button" class="toggle-pass" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="form-error" id="errorPass">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="errorPassText"></span>
                    </div>
                </div>

                <label class="form-remember">
                    <input type="checkbox" id="rememberMe">
                    <span id="rememberText"></span>
                </label>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-login-text" id="loginBtnText"></span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="login-hint">
                <code>admin</code> / <code>admin123</code><br>
                <code>staff</code> / <code>staff123</code>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
